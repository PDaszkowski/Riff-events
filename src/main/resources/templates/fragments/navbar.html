<nav th:fragment="navbar" class="navbar" xmlns:sec="http://www.w3.org/1999/xhtml">
    <div class="navbar-brand">
        <span class="navbar-icon">🎸</span>
        <a href="/" class="navbar-logo">RiffEvents</a>
    </div>
    <div class="navbar-menu">
        <a href="/events" class="navbar-link">Concerts</a>
        <a href="/artists" class="navbar-link">Artists</a>
        <a href="/venues" class="navbar-link">Venues</a>
        <div sec:authorize="isAuthenticated()" class="navbar-user">
            <a th:href="@{/my-tickets}"
               sec:authorize="hasRole('USER') and !hasAnyRole('ADMIN', 'ORGANIZER')"
               class="navbar-link">My Tickets</a>
            <div sec:authorize="hasRole('ORGANIZER')" class="navbar-organizer">
                <a href="/organizer/dashboard" class="navbar-link" style="color: #ff4b2b;">Dashboard</a>
                <a href="/events/new" class="navbar-link organizer-link">New Event</a>
            </div>

            <div sec:authorize="hasRole('ADMIN')" class="navbar-admin">
                <a th:href="@{/admin/dashboard}" class="navbar-link admin-link">Admin Panel</a>
                <a th:href="@{/admin/users}" class="navbar-link admin-link">Users</a>
            </div>

            <div class="navbar-user-menu">
                <div class="navbar-avatar">👤</div>
                <form th:action="@{/auth/logout}" method="post" class="logout-form">
                    <button type="submit" class="logout-btn">Log out</button>
                </form>
            </div>
        </div>
        <div sec:authorize="!isAuthenticated()" class="navbar-auth">
            <a href="/auth/login" class="navbar-link login-link">Log in</a>
            <a href="/auth/register" class="navbar-link register-link">Register</a>
        </div>
    </div>
</nav>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Event - RiffEvents</title>
    <style>
        body { background: #121212; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 40px; }
        .form-container { background: #1e1e1e; padding: 30px; border-radius: 12px; width: 100%; max-width: 500px; border: 1px solid #333; }
        h2 { color: #ff6600; margin-top: 0; text-align: center; }
        label { display: block; margin: 10px 0 5px; color: #aaa; font-size: 14px; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 15px; background: #2d2d2d; border: 1px solid #444; border-radius: 6px; color: white; box-sizing: border-box; }
        input:focus { border-color: #ff6600; outline: none; }
        button { width: 100%; padding: 15px; background: #ff6600; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        button:hover { background: #e65c00; transform: translateY(-2px); }
        .back-link { display: block; text-align: center; margin-top: 15px; color: #888; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
<div class="form-container">
    <h2>New event</h2>
    <form id="eventForm">
        <label>Event title</label>
        <input type="text" id="title" placeholder="np. Thrash Metal Night" required>

        <label>Description</label>
        <textarea id="description" rows="3" placeholder="What will be going on?"></textarea>

        <label>Date and time</label>
        <input type="datetime-local" id="date" required>

        <label>ID of venue (from database)</label>
        <input type="number" id="venueId" placeholder="np. 1" required>

        <label>Link to poster (URL)</label>
        <input type="text" id="imageUrl" placeholder="http://...">

        <label>Artist ID (divided by comma)</label>
        <input type="text" id="artistIds" placeholder="np. 1, 2">

        <button type="submit">POST EVENT</button>
    </form>
    <a href="/events" class="back-link">← Return to the list</a>
</div>

<script>
    document.getElementById('eventForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const payload = {
            title: document.getElementById('title').value,
            description: document.getElementById('description').value,
            date: document.getElementById('date').value + ":00",
            venueId: parseInt(document.getElementById('venueId').value),
            imageUrl: document.getElementById('imageUrl').value,
            artistIds: document.getElementById('artistIds').value.split(',').map(id => parseInt(id.trim()))
        };

        fetch('/api/events/create', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
            .then(response => {
                if (response.ok) {
                    alert('🎸 Event added successfully!');
                    window.location.href = '/events';
                } else {
                    alert('Error adding event. Check console.');
                }
            })
            .catch(error => console.error('Error:', error));
    });
</script>
</body>
</html>
